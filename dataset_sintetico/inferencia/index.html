<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>Mole Detector</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                max-width: 900px;
                margin: 2rem auto;
                padding: 1rem;
            }
            #drop {
                border: 2px dashed #888;
                padding: 3rem;
                text-align: center;
                border-radius: 12px;
                cursor: pointer;
            }
            #drop.hover {
                background: #f0f0f0;
            }
            #canvas {
                max-width: 100%;
                margin-top: 1rem;
                border: 1px solid #ddd;
            }
            #results {
                margin-top: 1rem;
            }
            .det {
                padding: 0.5rem;
                background: #f5f5f5;
                border-radius: 6px;
                margin: 0.25rem 0;
            }
        </style>
    </head>
    <body>
        <h1>Mole Detector</h1>
        <div id="drop">Arrastrá una imagen acá o hacé click</div>
        <input type="file" id="file" accept="image/*" hidden />
        <canvas id="canvas"></canvas>
        <div id="results"></div>

        <script>
            const drop = document.getElementById("drop");
            const fileInput = document.getElementById("file");
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            const resultsDiv = document.getElementById("results");

            drop.onclick = () => fileInput.click();
            drop.ondragover = (e) => {
                e.preventDefault();
                drop.classList.add("hover");
            };
            drop.ondragleave = () => drop.classList.remove("hover");
            drop.ondrop = (e) => {
                e.preventDefault();
                drop.classList.remove("hover");
                handleFile(e.dataTransfer.files[0]);
            };
            fileInput.onchange = (e) => handleFile(e.target.files[0]);

            async function handleFile(file) {
                if (!file) return;
                resultsDiv.textContent = "Procesando...";

                const img = new Image();
                img.onload = async () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    const fd = new FormData();
                    fd.append("file", file);

                    try {
                        const res = await fetch("/api/predict", {
                            method: "POST",
                            body: fd,
                        });
                        if (!res.ok) throw new Error(await res.text());
                        const data = await res.json();
                        drawDetections(data.detections);
                    } catch (err) {
                        resultsDiv.textContent = "Error: " + err.message;
                    }
                };
                img.src = URL.createObjectURL(file);
            }

            function drawDetections(dets) {
                ctx.lineWidth = 3;
                ctx.font = "20px sans-serif";
                resultsDiv.innerHTML = "";

                dets.forEach((d) => {
                    const [x1, y1, x2, y2] = d.bbox;
                    ctx.strokeStyle = "#ff3b30";
                    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
                    ctx.fillStyle = "#ff3b30";
                    ctx.fillText(
                        `${d.class_name} ${(d.confidence * 100).toFixed(0)}%`,
                        x1,
                        y1 - 5,
                    );

                    const div = document.createElement("div");
                    div.className = "det";
                    div.textContent = `${d.class_name} — ${(d.confidence * 100).toFixed(1)}%`;
                    resultsDiv.appendChild(div);
                });

                if (!dets.length)
                    resultsDiv.textContent = "No se detectaron objetos.";
            }
        </script>
    </body>
</html>
